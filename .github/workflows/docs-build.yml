---
# =============================================================================
# Reusable Docs Build + Deploy Workflow
# =============================================================================
# Called by release.yml (tag-triggered) and pages.yml (manual fallback)
# Builds Rust API docs + mdBook, optionally deploys to GitHub Pages
# =============================================================================

name: Docs Build

on: # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      deploy:
        description: Deploy to GitHub Pages
        type: boolean
        default: false
      validate:
        description: Run documentation validation
        type: boolean
        default: false
      rust-cache-save:
        description: >-
          Save Rust cache (only main branch should save)
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  validate-docs:
    name: Validate Documentation
    if: inputs.validate
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: recursive
      - run: make docs WHAT=check
      - run: bash .github/setup-ci.sh
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - run: |
          sudo apt-get update
          sudo apt-get install -y nodejs npm
          npm install -g markdownlint-cli
      - run: make docs WHAT=validate QUICK=1

  docs-rust:
    name: Build Rust API Docs
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: recursive
      - run: bash .github/setup-ci.sh
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ inputs.rust-cache-save }}
      - run: make docs WHAT=rust
      - run: make test SCOPE=doc
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rust-api-docs
          path: target/doc/
          retention-days: 7
          include-hidden-files: false

  docs-book:
    name: Build mdBook
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: [validate-docs]
    if: |
      always() &&
      (needs.validate-docs.result == 'success' ||
       needs.validate-docs.result == 'skipped')
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: recursive
      - run: make docs WHAT=setup
      - run: make docs WHAT=sync
      - run: make docs WHAT=build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mdbook-docs
          path: book/book/
          retention-days: 7
          include-hidden-files: false

  deploy:
    name: Deploy to GitHub Pages
    if: |
      inputs.deploy &&
      always() &&
      !failure() &&
      !cancelled() &&
      (needs.docs-rust.result == 'success' ||
       needs.docs-book.result == 'success')
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: [docs-rust, docs-book]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: recursive
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: rust-api-docs
          path: docs-site/api/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: mdbook-docs
          path: docs-site/
      - name: Check artifacts exist
        run: |
          if [[ ! -f "docs-site/api/index.html" ]]; then
            echo "Warning: Rust API docs not found" >&2
            mkdir -p docs-site/api
          fi
          if [[ ! -f "docs-site/index.html" ]]; then
            echo "Warning: mdBook docs not found" >&2
            mkdir -p docs-site
          fi
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs-site
