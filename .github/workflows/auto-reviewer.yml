---
# =============================================================================
# Auto-Assign Reviewer
# =============================================================================
# Adds marlonsc as reviewer on every new PR not authored by marlonsc.
# =============================================================================

name: Auto Reviewer

on:  # yamllint disable-line rule:truthy
  pull_request_target:
    types: [opened]

jobs:
  assign-reviewer:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login != 'marlonsc'
    steps:
      - name: Add marlonsc as reviewer
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              reviewers: ['marlonsc']
            });
