[project]
name = "mcb"
languages = [
    "python",
    "rust",
]

[index]
ignore = [
    "node_modules",
    "dist",
    "build",
    ".git",
    "third-party",
]
include_tests = true
vendor_patterns = [
    "venv",
    ".venv",
    "site-packages",
    "__pycache__",
    "target",
    ".cargo",
    "third-party",
]

[embeddings]
provider = "local"
model = "nomic-embed-code"

[output]
max_refs = 20
max_impact_depth = 3
